<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMESEED 2026 - Participant Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <span class="header-title">GAMESEED 2026 Participant Checker</span>
        <span id="status" class="header-status">No CSV loaded</span>
    </header>

    <div class="main-container">
        <main class="main-content">
            <div class="data-source">
                <div class="card-group">
                    <div class="card">
                        <span class="card-label">Mobile</span>
                        <span class="card-count" id="mobile-count"></span>
                        <button id="mobile-browse" class="card-btn">Browse</button>
                    </div>
                    <div class="card">
                        <span class="card-label">PC</span>
                        <span class="card-count" id="pc-count"></span>
                        <button id="pc-browse" class="card-btn">Browse</button>
                    </div>
                </div>
                <div class="stats-bar">
                    <div class="stat-pill stat-total">
                        <span>Total</span>
                        <span class="stat-value" id="stat-total">--</span>
                    </div>
                    <div class="stat-pill stat-registered">
                        <span>Registered</span>
                        <span class="stat-value" id="stat-found">--</span>
                    </div>
                    <div class="stat-pill stat-not-found">
                        <span>Not Found</span>
                        <span class="stat-value" id="stat-notfound">--</span>
                    </div>
                    <div class="stat-pill stat-mobile">
                        <span>Mobile</span>
                        <span class="stat-value" id="stat-mobile">--</span>
                    </div>
                    <div class="stat-pill stat-pc">
                        <span>PC</span>
                        <span class="stat-value" id="stat-pc">--</span>
                    </div>
                </div>
            </div>

            <div class="input-results-row">
                <div class="paste-results-col">
                    <div class="paste-section">
                        <span class="section-label">Paste Names (Nama Lengkap @discord)</span>
                        <div class="input-wrapper">
                            <textarea id="names-input" class="input-box" placeholder="Waguri @Wagureng
Rentarou @BossTokoKue">Waguri @Wagureng
Rentarou @BossTokoKue</textarea>
                        </div>
                        <div class="button-row">
                            <button id="check-btn" class="btn">Check</button>
                            <button id="clear-btn" class="btn btn-outline">Clear</button>
                        </div>
                    </div>

                    <div class="results-section">
                        <span class="section-label">Results</span>
                        <div class="results-wrapper">
                            <div class="results-panel">
                                <div id="all-results" class="results-table-container"></div>
                            </div>
                            <div class="copyable-section">
                                <pre id="results-box" class="results-text">Nothing to see here</pre>
                                <span class="copy-hint" onclick="copyResults()">Copy</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="history-section">
                    <div class="history-header">
                        <span class="section-label">History</span>
                        <button id="copy-history-btn" class="btn btn-small">Copy</button>
                    </div>
                    <div id="history-list" class="history-list"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="gif-float">
        <img src="/static/images.steamusercontent.gif" alt="GIF" onerror="this.parentElement.style.display='none'">
    </div>

<script src="/static/app.js"></script>
    <script>
    // Mock history for testing - remove this later
    // Use addToHistory with mock data to properly set local history variable
    window.mockResults = [
        { verified: true, team: 'Test Team 1', source: 'Mobile' },
        { verified: true, team: 'Test Team 2', source: 'PC' }
    ];

    // Wait for app.js to load then add mock history
    function setupMockHistory() {
        if (typeof addToHistory === 'function') {
            addToHistory(window.mockResults);
        } else {
            setTimeout(setupMockHistory, 100);
        }
    }
    setupMockHistory();

    // Make inline script use same history as app.js
    function copyResults() {
        const text = document.getElementById('results-box').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const hint = document.querySelector('.copy-hint');
            hint.textContent = 'Copied!';
            setTimeout(() => hint.textContent = 'Copy', 1000);
        }).catch(err => {
            console.error('Error copying:', err);
        });
        // Use app.js's addToHistory if available
        if (window.currentResults && window.currentResults.length > 0 && window.addToHistory) {
            window.addToHistory(window.currentResults);
        }
    }

    // Copy history button handler
    document.getElementById('copy-history-btn').addEventListener('click', function() {
        if (typeof copyHistory === 'function') {
            copyHistory();
        }
    });
    </script>
</body>
</html>
